<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Flash Cards</title>
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
  background: #f5f7fb;
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

.navbar-brand {
  margin-right: 50px;
}

.upload {
  margin-bottom: 20px;
}

.mode-toggle {
  margin-bottom: 20px;
}

button {
  margin: 6px;
  padding: 10px 22px;
  font-size: 16px;
  font-weight: 600;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  cursor: pointer;
  background: #ffffff;
  color: #334155;
  transition: all 0.2s ease-in-out;
}

button.primary-btn {
  background: #1e293b;
  color: #ffffff;
  border-color: #1e293b;
}

button:hover {
  background: #f1f5f9;
  color: #0f172a;
  border-color: #94a3b8;
}

button.primary-btn:hover {
  background: #334155;
  color: #ffffff;
  border-color: #334155;
}

/* Flashcard */
.card-container {
  perspective: 1000px;
  display: flex;
  justify-content: center;
  margin: 20px 0;
}

.card {
  width: 550px;
  height: 380px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
  cursor: pointer;
}

.card.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 36px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.card-front {
  background: white;
}

.card-back {
  background: #1e293b;
  color: white;
  transform: rotateY(180deg);
}

/* Quiz mode */
.quiz {
  display: none;
  margin-top: 20px;
}

.quiz input {
  padding: 12px 15px;
  font-size: 30px;
  width: 320px;
  border-radius: 8px;
  border: 2px solid #cbd5e1;
  outline: none;
  transition: border-color 0.2s;
}

.quiz input:focus {
  border-color: #1e293b;
}

.feedback {
  margin-top: 10px;
}

.correct {
  color: #16a34a;
  font-size: 20px;
  font-weight: bold;
}

.wrong {
  color: #dc2626;
  font-size: 20px;
  font-weight: bold;
}

/* Regular Script (Zhengkai) Font Stack */
.kaiti {
  font-family: "KaiTi", "楷体", "STKaiti", "华文楷体", "BiaoKai", "標楷體", serif;
}
</style>
</head>

<body>
<!-- Navbar -->
        <div class="container-fluid p-0">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <a class="navbar-brand" href="index.html">Wang's Home</a>

                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="Trends.html">Trends</a>
                        </li>

                        </li>

                            <a class="nav-link" href="Color.html">Color</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="Highlighting.html">Highlighting</a>

                            <a class="nav-link" href="Typing_speed.html">Typing Speed</a>
                        </li>

                    </ul>
                </div>

<h1>Flash Cards</h1>

<div class="upload">
  <input type="file" id="fileInput" accept=".txt,.json" class="form-control-file border p-2 rounded mx-auto" style="max-width: 320px; background: white; border-color: #cbd5e1 !important;" />
</div>

<div class="mode-toggle">
  <button id="btnFlash" onclick="setMode('flash')" class="primary-btn">Flashcard Mode</button>
  <button id="btnQuiz" onclick="setMode('quiz')">Quiz Mode</button>
</div>

<!-- Flashcard Mode -->
<div id="flashMode">
  <div class="card-container">
    <div id="flashcard" class="card">
      <div class="card-face card-front" id="cardFront">
        Upload a file to start
      </div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>
  <div>
    <button onclick="flipCard()">Flip</button>
    <button onclick="nextCard()" class="primary-btn">Next</button>
    <button onclick="originalList()">Original List</button>
    <button onclick="randomCard()">Random</button>
    <button onclick="random20()">🎲 Give Me 20!</button>
  </div>

  <!-- Congrats Box -->
  <div id="congratsAlert" class="alert alert-success mx-auto mt-4" style="display: none; max-width: 340px; font-size: 16px; border-radius: 8px; font-weight: 500;">
    🎉 <strong>Congratulations!</strong> You've finished the list!
  </div>

  <div class="progress-container mx-auto mt-4" style="max-width: 340px;">
    <div class="progress" style="height: 20px;">
      <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
    </div>
    <div id="progressText" class="mt-2" style="font-size: 18px; font-weight: bold; color: #555;"></div>
  </div>
</div>

<!-- Quiz Mode -->
<div id="quizMode" class="quiz">
  <!-- Display Box -->
  <div class="mx-auto mb-3 d-flex justify-content-center align-items-center" style="width: fit-content; border-radius: 20px; border: 1px solid #cbd5e1; background-color: #f8fafc; padding: 4px 18px; gap: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.02);">
    <span class="text-muted text-uppercase" style="font-size: 12px; font-weight: 700; letter-spacing: 1px;">Display:</span>
    <div class="custom-control custom-radio mb-0">
      <input type="radio" id="showPinyin" name="quizShowOption" class="custom-control-input" value="pinyin" checked onchange="updateQuiz()">
      <label class="custom-control-label pt-1" for="showPinyin" style="font-size: 14px; font-weight: 600; color: #334155; cursor: pointer; line-height: 1.2;">拼音</label>
    </div>
    <div class="custom-control custom-radio mb-0">
      <input type="radio" id="showEnglish" name="quizShowOption" class="custom-control-input" value="english" onchange="updateQuiz()">
      <label class="custom-control-label pt-1" for="showEnglish" style="font-size: 14px; font-weight: 600; color: #334155; cursor: pointer; line-height: 1.2;">English</label>
    </div>
  </div>

  <!-- Centered Quiz Area -->
  <div class="d-flex flex-column justify-content-center align-items-center" style="margin-top: 45px;">
    <h2 id="quizPrompt" style="color: #1e293b; margin-bottom: 15px; font-size: 32px;">English</h2>

    <input
      type="text"
      id="quizInput"
      class="kaiti"
      placeholder="Type Chinese here"
      onkeydown="if(event.key==='Enter') checkAnswer()"
    />

    <div class="mt-3">
      <button onclick="checkAnswer()" class="primary-btn">Submit</button>
      <button onclick="nextQuiz()">Skip</button>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>
</div>

<script>
let allCards = [];
let flashcards = [];
let currentIndex = 0;
let mode = "flash";
let flipTimeout;

const card = document.getElementById("flashcard");
const front = document.getElementById("cardFront");
const back = document.getElementById("cardBack");

const quizPrompt = document.getElementById("quizPrompt");
const quizInput = document.getElementById("quizInput");
const feedback = document.getElementById("feedback");

document.getElementById("fileInput").addEventListener("change", handleFileUpload);
card.onclick = flipCard;

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => parseFile(file.name, reader.result);
  reader.readAsText(file, "UTF-8");
}

function parseFile(name, content) {
  if (name.endsWith(".json")) {
    allCards = JSON.parse(content);
  } else {
    allCards = content
      .split("\n")
      .map(l => l.trim())
      .filter(Boolean)
      .map(l => {
        const parts = l.split("|");
        if (parts.length >= 3) {
            return { chinese: parts[0].trim(), pinyin: parts[1].trim(), english: parts[2].trim() };
        } else if (parts.length === 2) {
            // Fallback for old 2-part format
            return { chinese: parts[0].trim(), pinyin: "", english: parts[1].trim() };
        } else {
            return { chinese: parts[0].trim(), pinyin: "", english: "" };
        }
      });
  }

  flashcards = [...allCards];
  currentIndex = 0;
  showCard();
  updateQuiz();
}

function showCard() {
  if (!flashcards.length) return;
  
  clearTimeout(flipTimeout);
  if (card.classList.contains("flipped")) {
    card.classList.remove("flipped");
    flipTimeout = setTimeout(() => {
      updateCardContent();
    }, 300); // Waits half-way through the 0.6s animation before updating the text
  } else {
    updateCardContent();
  }
}

function updateCardContent() {
  if (!flashcards.length) return;
  const cardData = flashcards[currentIndex];
  
  const chinese = cardData.chinese || cardData.front || "";
  const pinyin = cardData.pinyin || "";
  const english = cardData.english || cardData.back || "";
  
  front.innerHTML = `<div class="kaiti" style="font-size: 100px; font-weight: bold;">${chinese}</div>`;
  
  let backHTML = `<div class="kaiti" style="font-size: 80px; margin-bottom: 15px; font-weight: bold;">${chinese}</div>`;
  if (pinyin) backHTML += `<div style="font-size: 36px; font-weight: 500; color: #94a3b8; margin-bottom: 8px;">${pinyin}</div>`;
  if (english) backHTML += `<div style="font-size: 30px; font-weight: 400; color: #cbd5e1;">${english}</div>`;
  back.innerHTML = backHTML;
  
  const currentNum = currentIndex + 1;
  const totalNum = flashcards.length;
  document.getElementById('progressText').textContent = `${currentNum} / ${totalNum}`;
  const pct = (currentNum / totalNum) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function flipCard() {
  card.classList.toggle("flipped");
}

function nextCard() {
  if (flashcards.length > 0 && currentIndex === flashcards.length - 1) {
    showCongrats();
  }
  currentIndex = (currentIndex + 1) % flashcards.length;
  showCard();
}

function showCongrats() {
  const alertBox = document.getElementById("congratsAlert");
  alertBox.style.display = "block";
  setTimeout(() => {
    alertBox.style.display = "none";
  }, 5000);
}

function randomCard() {
  flashcards = shuffle([...allCards]);
  currentIndex = 0;
  showCard();
  updateQuiz();
}

function random20() {
  flashcards = shuffle([...allCards]).slice(0, 20);
  currentIndex = 0;
  showCard();
  updateQuiz();
}

function originalList() {
  flashcards = [...allCards];
  currentIndex = 0;
  showCard();
  updateQuiz();
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

/* Mode Switching */
function setMode(m) {
  mode = m;
  document.getElementById("flashMode").style.display =
    m === "flash" ? "block" : "none";
  document.getElementById("quizMode").style.display =
    m === "quiz" ? "block" : "none";

  if (m === "flash") {
    document.getElementById("btnFlash").classList.add("primary-btn");
    document.getElementById("btnQuiz").classList.remove("primary-btn");
  } else {
    document.getElementById("btnQuiz").classList.add("primary-btn");
    document.getElementById("btnFlash").classList.remove("primary-btn");
  }

  if (m === "quiz") updateQuiz();
}

/* Quiz Logic */
function updateQuiz() {
  if (!flashcards.length) return;
  
  const cardData = flashcards[currentIndex];
  const pinyin = cardData.pinyin || "";
  const english = cardData.english || cardData.back || "";
  
  const showOption = document.querySelector('input[name="quizShowOption"]:checked').value;
  quizPrompt.textContent = showOption === 'pinyin' ? pinyin : english;
  
  quizInput.value = "";
  feedback.textContent = "";
}

function checkAnswer() {
  if (!flashcards.length) return;
  const answer = quizInput.value.trim();
  const cardData = flashcards[currentIndex];
  
  const correct = (cardData.chinese || cardData.front || "").trim();
  const pinyin = cardData.pinyin || "";
  const english = cardData.english || cardData.back || "";
  
  let allThreeHTML = `<div class="kaiti" style="margin-top: 10px; font-size: 36px; font-weight: bold; color: #1e293b;">${correct}</div>`;
  if (pinyin) allThreeHTML += `<div style="font-size: 28px; font-weight: 500; color: #475569; margin-top: 4px;">${pinyin}</div>`;
  if (english) allThreeHTML += `<div style="font-size: 24px; color: #64748b; margin-top: 2px;">${english}</div>`;

  if (answer === correct) {
    feedback.innerHTML = `<div class="correct">✔ Correct!</div>${allThreeHTML}`;
    feedback.className = "feedback";
  } else {
    feedback.innerHTML = `<div class="wrong">✘ Wrong</div>${allThreeHTML}`;
    feedback.className = "feedback";
  }
}

function nextQuiz() {
  nextCard();
  updateQuiz();
}
</script>

</body>
</html>
